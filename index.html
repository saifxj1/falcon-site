<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── EMAILJS ── */
const EMAILJS_CONFIG={publicKey:'YOUR_PUBLIC_KEY',serviceId:'YOUR_SERVICE_ID',templateId:'YOUR_TEMPLATE_ID'};

/* ══════════════════════════════════════════════
   GOOGLE OAUTH CONFIG
   1. روح https://console.cloud.google.com
   2. New Project → APIs & Services → Credentials
   3. Create OAuth 2.0 Client ID → Web application
   4. Authorized JS origins: حط رابط موقعك (أو http://localhost للتجربة)
   5. انسخ الـ Client ID وحطه هنا
══════════════════════════════════════════════ */
const GOOGLE_CLIENT_ID = '696877094927-lc7oe1tgc167nf1h0cqoouvcmtcc8eng.apps.googleusercontent.com';

/* ── JWT decoder (for Google credential) ── */
function decodeJWT(token){
  try{
    const base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const json=decodeURIComponent(atob(base64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch{return null;}
}

/* ── Handle Google Sign-In response ── */
function handleGoogleLogin(credential, onLogin, sendWelcome){
  const payload=decodeJWT(credential);
  if(!payload)return{ok:false,err:'Google login failed'};
  const{name,email,sub:googleId,picture}=payload;
  // Check if user exists, if not register them
  const db=FalconDB._read();
  let user=db.users.find(u=>u.email===email);
  let isNew=false;
  if(!user){
    const result=FalconDB.register({name,email,password:'__google__'+googleId});
    if(!result.ok)return{ok:false,err:result.err};
    user=result.user;
    user.googleId=googleId;
    user.avatar=picture||null;
    user.authProvider='google';
    FalconDB._write(db);
    isNew=true;
  } else {
    user.lastLogin=FalconDB._now();
    if(!user.googleId){user.googleId=googleId;user.authProvider='google';}
    FalconDB._write(db);
  }
  const s={name:user.name,em:email,id:user.id,avatar:picture||null,provider:'google'};
  localStorage.setItem('fcn_s',JSON.stringify(s));
  if(isNew&&sendWelcome)sendWelcomeEmail(name,email);
  return{ok:true,session:s,isNew};
}

/* ── FALCONDB ── */
const FalconDB={
  _uid:()=>'usr_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36),
  _now:()=>new Date().toISOString(),
  _read:function(){try{return JSON.parse(localStorage.getItem('fcn_db')||'null')||{users:[],meta:{totalUsers:0}};}catch{return{users:[],meta:{}};}},
  _write:function(db){localStorage.setItem('fcn_db',JSON.stringify(db));},
  _migrate:function(){const o=localStorage.getItem('fcn_u');if(!o)return;try{const a=JSON.parse(o),db=this._read();a.forEach(u=>{if(!db.users.find(x=>x.email===u.em)){db.users.push({id:this._uid(),name:u.nm,email:u.em,password:u.pw,createdAt:this._now(),lastLogin:null,purchases:[],verified:false});db.meta.totalUsers++;}});this._write(db);localStorage.removeItem('fcn_u');}catch(e){}},
  register:function({name,email,password}){this._migrate();const db=this._read();if(db.users.find(u=>u.email===email))return{ok:false,err:'Email already registered'};const user={id:this._uid(),name,email,password,createdAt:this._now(),lastLogin:this._now(),purchases:[],verified:false};db.users.push(user);db.meta.totalUsers=db.users.length;db.meta.lastUpdated=this._now();this._write(db);return{ok:true,user};},
  login:function({email,password}){this._migrate();const db=this._read();const user=db.users.find(u=>u.email===email&&u.password===password);if(!user)return{ok:false,err:'Incorrect email or password'};user.lastLogin=this._now();this._write(db);return{ok:true,user};},
  getUsers:function(){this._migrate();return this._read().users;},

/* ── REVIEWS PERSISTENCE ── */
function loadLocalReviews(){try{return JSON.parse(localStorage.getItem('fcn_reviews_v2')||'[]');}catch{return[];}}
function saveLocalReviews(arr){try{localStorage.setItem('fcn_reviews_v2',JSON.stringify(arr));}catch{}}
function mergeReviews(a,b){const seen=new Set();return[...a,...b].filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});}

const JSONBIN_CONFIG={binId:'YOUR_BIN_ID',apiKey:'YOUR_API_KEY'};
async function fetchSharedReviews(){const local=loadLocalReviews();if(JSONBIN_CONFIG.binId==='YOUR_BIN_ID')return local;try{const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`,{headers:{'X-Master-Key':JSONBIN_CONFIG.apiKey,'X-Bin-Meta':'false'}});const d=await r.json();const remote=Array.isArray(d.reviews)?d.reviews:[];const merged=mergeReviews(local,remote);if(merged.length>remote.length)pushSharedReview(merged).catch(()=>{});saveLocalReviews(merged);return merged;}catch(e){return local;}}
async function pushSharedReview(reviews){saveLocalReviews(reviews);if(JSONBIN_CONFIG.binId==='YOUR_BIN_ID')return;try{await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_CONFIG.apiKey},body:JSON.stringify({reviews})});}catch(e){}}

/* ══ HLS VIDEO ══ */
function HLSVideo({src,style}){
  const vr=useRef(null);
  useEffect(()=>{
    const v=vr.current;if(!v||!src)return;
    let hls;
    if(window.Hls&&window.Hls.isSupported()){
      hls=new window.Hls();hls.loadSource(src);hls.attachMedia(v);
      hls.on(window.Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    }else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src=src;v.addEventListener('loadedmetadata',()=>v.play().catch(()=>{}));
    }
    return()=>{if(hls)hls.destroy()};
  },[src]);
  return <video ref={vr} muted loop playsInline style={style}/>;
}

function Feedback({t,setPage,onReviewsReady}){
  const[sharedReviews,setSharedReviews]=useState(()=>loadLocalReviews());
  const[loading,setLoading]=useState(true);
  useEffect(()=>{fetchSharedReviews().then(r=>{setSharedReviews(r);setLoading(false);if(onReviewsReady)onReviewsReady(r);});},[]);
  const allReviews=[...SEED_REVIEWS,...sharedReviews];
  const addReview=useCallback(async r=>{const updated=[...sharedReviews,r];setSharedReviews(updated);if(onReviewsReady)onReviewsReady(updated);await pushSharedReview(updated);},[sharedReviews,onReviewsReady]);
  const avg=allReviews.length?(allReviews.reduce((s,r)=>s+r.stars,0)/allReviews.length).toFixed(1):'5.0';

function FivemHLSBg(){
  const vr=useRef(null);
  useEffect(()=>{
    const v=vr.current;
    if(!v)return;
    let hls;
    const src='https://stream.mux.com/9JXDljEVWYwWu01PUkAemafDugK89o01BR6zqJ3aS9u00A.m3u8';
    if(window.Hls&&window.Hls.isSupported()){
      hls=new window.Hls({lowLatencyMode:false});
      hls.loadSource(src);
      hls.attachMedia(v);
      hls.on(window.Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    } else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src=src;
      v.play().catch(()=>{});
    }
    return()=>{if(hls)hls.destroy();};
  },[]);
  return(
    <div style={{position:'absolute',bottom:'35vh',left:0,right:0,height:'80vh',zIndex:0,overflow:'hidden',pointerEvents:'none'}}>
      <video ref={vr} muted loop playsInline autoPlay style={{width:'100%',height:'100%',objectFit:'cover',opacity:1}}/>

      <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#000 0%,rgba(0,0,0,.15) 20%,rgba(60,20,120,.1) 50%,rgba(0,0,0,.2) 80%,#000 100%)'}}/>
    </div>
  );
}

function DashboardPage({setPage,t,user,onLogout,onUpdateUser}){
  const[dbUser,setDbUser]=useState(()=>{try{const db=JSON.parse(localStorage.getItem('fcn_db')||'{}');return(db.users||[]).find(u=>u.email===user.em)||null;}catch{return null;}});
  const joinDate=dbUser?.createdAt?new Date(dbUser.createdAt).toLocaleDateString('en-US',{month:'long',year:'numeric'}):'2026';
  const purchases=dbUser?.purchases||[];

  /* ── Edit state ── */
  const[editName,setEditName]=useState(false);
  const[editAvatar,setEditAvatar]=useState(false);
  const[nameVal,setNameVal]=useState(user.name||'');
  const[avatarVal,setAvatarVal]=useState(user.avatar||dbUser?.avatar||'');
  const[avatarPreview,setAvatarPreview]=useState(user.avatar||dbUser?.avatar||'');
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState('');
  const fileInputRef=useRef(null);

  /* ── Save helpers ── */
  const saveName=()=>{
    if(!nameVal.trim())return;
    setSaving(true);
    try{
      const db=JSON.parse(localStorage.getItem('fcn_db')||'{}');
      const users=db.users||[];
      const idx=users.findIndex(u=>u.email===user.em);
      if(idx>=0){users[idx].name=nameVal.trim();db.users=users;localStorage.setItem('fcn_db',JSON.stringify(db));}
      const newSession={...user,name:nameVal.trim()};
      localStorage.setItem('fcn_s',JSON.stringify(newSession));
      onUpdateUser(newSession);
      setDbUser(prev=>prev?{...prev,name:nameVal.trim()}:prev);
      setSaved('name');setTimeout(()=>setSaved(''),2000);
    }catch{}
    setSaving(false);setEditName(false);
  };

  const saveAvatar=(dataUrl)=>{
    setSaving(true);
    try{
      const db=JSON.parse(localStorage.getItem('fcn_db')||'{}');
      const users=db.users||[];
      const idx=users.findIndex(u=>u.email===user.em);
      if(idx>=0){users[idx].avatar=dataUrl;db.users=users;localStorage.setItem('fcn_db',JSON.stringify(db));}
      const newSession={...user,avatar:dataUrl};
      localStorage.setItem('fcn_s',JSON.stringify(newSession));
      onUpdateUser(newSession);
      setDbUser(prev=>prev?{...prev,avatar:dataUrl}:prev);
      setSaved('avatar');setTimeout(()=>setSaved(''),2000);
    }catch{}
    setSaving(false);setEditAvatar(false);
  };

  const onFileChange=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    if(file.size>2*1024*1024){alert('Image must be under 2MB');return;}
    const reader=new FileReader();
    reader.onload=(ev)=>{setAvatarPreview(ev.target.result);saveAvatar(ev.target.result);};
    reader.readAsDataURL(file);
  };

  const currentAvatar=user.avatar||dbUser?.avatar||'';
  const av=user.name?.[0]?.toUpperCase()||'?';

  return(
    <div style={{position:'relative',minHeight:'100vh',background:'#000',overflow:'hidden',paddingTop:70}}>
      <AnimatedOrbs/><GridLines/><Particles count={14} color="rgba(60,120,255,.35)"/>
      <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFileChange}/>
      <div style={{position:'relative',zIndex:10,maxWidth:860,margin:'0 auto',padding:'60px 24px 100px'}}>
        <button onClick={()=>setPage('home')} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',fontFamily:'inherit',fontSize:'.78rem',display:'flex',alignItems:'center',gap:6,marginBottom:40,transition:'color .2s',letterSpacing:'.06em',textTransform:'uppercase',padding:0}} onMouseOver={e=>e.currentTarget.style.color='rgba(255,255,255,.6)'} onMouseOut={e=>e.currentTarget.style.color='rgba(255,255,255,.3)'}>← Back</button>

        {/* HERO CARD */}
        <div style={{position:'relative',border:'0.6px solid rgba(255,255,255,.08)',borderRadius:24,padding:'36px',background:'rgba(255,255,255,.02)',marginBottom:14,overflow:'hidden',animation:'revealUp .7s .05s both'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,rgba(60,120,255,.7) 30%,rgba(120,80,255,.8) 50%,rgba(60,120,255,.7) 70%,transparent)'}}/>
          <div style={{display:'flex',alignItems:'flex-start',gap:22,flexWrap:'wrap'}}>

            {/* AVATAR — click to change */}
            <div style={{position:'relative',flexShrink:0,cursor:'pointer',group:'avatar'}} onClick={()=>fileInputRef.current?.click()} title="Change photo">
              {currentAvatar?(
                <img src={currentAvatar} alt="avatar" style={{width:76,height:76,borderRadius:'50%',objectFit:'cover',boxShadow:'0 0 0 3px rgba(80,140,255,.2),0 0 30px rgba(80,140,255,.15)'}}/>
              ):(
                <div style={{width:76,height:76,borderRadius:'50%',background:'linear-gradient(135deg,rgba(60,120,255,.9),rgba(110,60,255,.85))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.8rem',fontWeight:700,color:'#fff',boxShadow:'0 0 0 3px rgba(80,140,255,.2),0 0 30px rgba(80,140,255,.15)'}}>{av}</div>
              )}
              {/* hover overlay */}
              <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s'}}
                onMouseOver={e=>e.currentTarget.style.opacity='1'} onMouseOut={e=>e.currentTarget.style.opacity='0'}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
              {saved==='avatar'&&(
                <div style={{position:'absolute',inset:0,borderRadius:'50%',background:'rgba(34,197,94,.25)',border:'2px solid rgba(34,197,94,.6)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(34,197,94,.9)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
              )}
              <div style={{position:'absolute',bottom:0,right:0,width:22,height:22,borderRadius:'50%',background:'rgba(60,120,255,.9)',border:'2px solid #000',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </div>
            </div>

            {/* NAME + INFO */}
            <div style={{flex:1,minWidth:0}}>
              {editName?(
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                  <input
                    autoFocus
                    value={nameVal}
                    onChange={e=>setNameVal(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter')saveName();if(e.key==='Escape')setEditName(false);}}
                    style={{background:'rgba(255,255,255,.06)',border:'0.6px solid rgba(60,120,255,.5)',borderRadius:10,padding:'7px 12px',color:'#fff',fontSize:'clamp(1rem,2.5vw,1.3rem)',fontWeight:700,letterSpacing:'-.025em',outline:'none',fontFamily:'inherit',flex:1,minWidth:0}}
                  />
                  <button onClick={saveName} style={{background:'rgba(60,120,255,.2)',border:'0.6px solid rgba(60,120,255,.4)',borderRadius:8,padding:'7px 14px',cursor:'pointer',color:'rgba(100,160,255,.9)',fontSize:'.8rem',fontFamily:'inherit',fontWeight:500,flexShrink:0,transition:'all .2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(60,120,255,.35)'} onMouseOut={e=>e.currentTarget.style.background='rgba(60,120,255,.2)'}>Save</button>
                  <button onClick={()=>{setEditName(false);setNameVal(user.name||'');}} style={{background:'none',border:'0.6px solid rgba(255,255,255,.1)',borderRadius:8,padding:'7px 12px',cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:'.8rem',fontFamily:'inherit',flexShrink:0}}>✕</button>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
                  <h1 style={{fontWeight:700,fontSize:'clamp(1.2rem,3vw,1.65rem)',letterSpacing:'-.035em',color:'#fff',margin:0}}>{user.name}</h1>
                  {saved==='name'&&<span style={{fontSize:'.72rem',color:'rgba(34,197,94,.8)',fontWeight:500}}>✓ Saved</span>}
                  <button onClick={()=>{setEditName(true);setNameVal(user.name||'');}} style={{background:'rgba(255,255,255,.05)',border:'0.6px solid rgba(255,255,255,.1)',borderRadius:8,padding:'4px 10px',cursor:'pointer',color:'rgba(255,255,255,.4)',fontSize:'.72rem',fontFamily:'inherit',display:'flex',alignItems:'center',gap:5,transition:'all .2s'}} onMouseOver={e=>{e.currentTarget.style.background='rgba(255,255,255,.1)';e.currentTarget.style.color='rgba(255,255,255,.7)';}} onMouseOut={e=>{e.currentTarget.style.background='rgba(255,255,255,.05)';e.currentTarget.style.color='rgba(255,255,255,.4)';}}>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit
                  </button>
                  <span style={{background:'rgba(60,120,255,.1)',border:'0.6px solid rgba(60,120,255,.25)',color:'rgba(80,140,255,.9)',borderRadius:100,padding:'3px 11px',fontSize:'.68rem',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase'}}>Member</span>
                </div>
              )}
              <p style={{color:'rgba(255,255,255,.5)',fontSize:'.88rem',fontWeight:300,marginBottom:3}}>{user.em}</p>
              <p style={{color:'rgba(255,255,255,.3)',fontSize:'.78rem',fontWeight:300}}>Member since {joinDate}</p>
              <p style={{color:'rgba(255,255,255,.22)',fontSize:'.72rem',fontWeight:300,marginTop:4}}>Click your avatar to change photo (max 2MB)</p>
            </div>

            <button onClick={onLogout} style={{background:'none',border:'0.6px solid rgba(255,80,80,.18)',borderRadius:10,padding:'8px 16px',cursor:'pointer',color:'rgba(255,100,100,.6)',fontSize:'.78rem',fontFamily:'inherit',transition:'all .2s',flexShrink:0}} onMouseOver={e=>{e.currentTarget.style.background='rgba(255,80,80,.08)';e.currentTarget.style.borderColor='rgba(255,80,80,.3)';}} onMouseOut={e=>{e.currentTarget.style.background='none';e.currentTarget.style.borderColor='rgba(255,80,80,.18)';}}>Sign out</button>
          </div>
        </div>

        {/* STATS */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14,animation:'revealUp .7s .12s both'}}>
          {[['Account','Active','rgba(34,197,94,.85)'],['Orders',String(purchases.length||0),'#fff'],['Plan','Free','rgba(160,130,255,.9)']].map(([label,val,vc])=>(
            <div key={label} style={{border:'0.6px solid rgba(255,255,255,.07)',borderRadius:16,padding:'18px 16px',background:'rgba(255,255,255,.02)'}}>
              <p style={{fontSize:'.68rem',color:'rgba(255,255,255,.3)',fontWeight:500,letterSpacing:'.06em',textTransform:'uppercase',marginBottom:8}}>{label}</p>
              <p style={{fontWeight:700,fontSize:'1.25rem',letterSpacing:'-.03em',color:vc}}>{val}</p>
            </div>
          ))}
        </div>

        {/* ORDER HISTORY */}
        <div style={{border:'0.6px solid rgba(255,255,255,.07)',borderRadius:20,overflow:'hidden',marginBottom:14,animation:'revealUp .7s .2s both',background:'rgba(255,255,255,.02)'}}>
          <div style={{padding:'18px 24px 14px',borderBottom:'0.6px solid rgba(255,255,255,.06)',display:'flex',alignItems:'center',gap:8}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span style={{fontWeight:600,fontSize:'.9rem',letterSpacing:'-.02em',color:'#fff'}}>Order History</span>
          </div>
          <div style={{padding:'0 24px'}}>
            {purchases.length===0?(
              <div style={{padding:'40px 0',textAlign:'center'}}>
                <p style={{color:'rgba(255,255,255,.3)',fontSize:'.88rem',fontWeight:300}}>No orders yet</p>
                <p style={{color:'rgba(255,255,255,.18)',fontSize:'.78rem',fontWeight:300,marginTop:4}}>Your purchases will appear here.</p>
              </div>
            ):purchases.map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 0',borderBottom:i<purchases.length-1?'0.6px solid rgba(255,255,255,.05)':'none'}}>
                <div><p style={{fontWeight:500,fontSize:'.85rem',color:'#fff',marginBottom:2}}>{p.name||'Product'}</p><p style={{fontSize:'.72rem',color:'rgba(255,255,255,.3)',fontWeight:300}}>{p.date||''}</p></div>
                <span style={{fontWeight:600,fontSize:'.9rem',color:'#fff'}}>${p.price?.toFixed(2)||'—'}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ACTIONS */}
        <div style={{animation:'revealUp .7s .28s both'}}>
          <p style={{fontSize:'.68rem',letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(255,255,255,.28)',fontWeight:500,marginBottom:12}}>Quick Actions</p>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="pill-ghost" style={{fontSize:'.82rem'}} onClick={()=>setPage('home')}>Browse Products →</button>
            <button className="pill-discord" style={{fontSize:'.82rem',gap:7}} onClick={()=>window.open('https://discord.gg/fcn','_blank')}><DiscordSvg/> Discord Support</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const[page,setPage]=useState('home');
  const[lang,setLang]=useState('en');
  const t=T[lang];
  const[auth,setAuth]=useState(null);
  const[authTab,setAuthTab]=useState('signup');
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('fcn_s'))}catch{return null}});
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[checkout,setCheckout]=useState(null);
  const[purchaseSuccess,setPurchaseSuccess]=useState(()=>{
    /* Check if returning from PayPal with ?paid=1 */
    try{
      const params=new URLSearchParams(window.location.search);
      if(params.get('paid')==='1'){
        const itemName=decodeURIComponent(params.get('item')||'Falcon Product');
        window.history.replaceState({},'',window.location.pathname);
        return {name:{en:itemName,ar:itemName},id:'paypal_return'};
      }
    }catch{}
    return null;
  });
  const[allUserReviews,setAllUserReviews]=useState(()=>loadLocalReviews());
  useEffect(()=>{window.scrollTo({top:0,behavior:'instant'})},[page]);
  const openAuth=tp=>{setAuthTab(tp);setAuth(true)};
  const add=p=>{setCart(c=>{const e=c.find(i=>i.id===p.id);return e?c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...c,{...p,qty:1}]});setCartOpen(true)};
  const qty=(id,d)=>setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const rem=id=>setCart(c=>c.filter(i=>i.id!==id));
  const cn=cart.reduce((s,i)=>s+i.qty,0);
  const ct=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const allReviewsCombined=[...SEED_REVIEWS,...allUserReviews];
  const handleAddReview=useCallback(async r=>{const updated=[...allUserReviews,r];setAllUserReviews(updated);await pushSharedReview(updated);},[allUserReviews]);
  const handleLogout=()=>{setUser(null);localStorage.removeItem('fcn_s');setPage('home');};
  return(
    <div style={{minHeight:'100vh',background:'#000',direction:t.dir}}>
      <Navbar onAuth={openAuth} user={user} n={cn} onCart={()=>setCartOpen(true)} page={page} setPage={setPage} lang={lang} setLang={setLang} t={t}/>
      {page==='home'&&<HomePage t={t} onAuth={openAuth} onAdd={add} onBuy={p=>setCheckout({type:'product',product:p})} setPage={setPage} onReviewsReady={setAllUserReviews}/>}
      {page==='about'&&<AboutPage setPage={setPage} t={t}/>}
      {page==='terms'&&<TermsPage setPage={setPage} t={t}/>}
      {page==='reviews'&&<AllReviewsPage setPage={setPage} t={t} reviews={allReviewsCombined} onAddReview={handleAddReview}/>}
      {page==='dashboard'&&user&&<DashboardPage setPage={setPage} t={t} user={user} onLogout={handleLogout} onUpdateUser={u=>{setUser(u);localStorage.setItem('fcn_s',JSON.stringify(u));}}/>}
      {page==='dashboard'&&!user&&<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><button className="pill-ghost" onClick={()=>openAuth('signin')}>Sign in to view dashboard</button></div>}
      {page==='graphics'&&<GraphicsPage setPage={setPage}/>}
      {page==='home'&&<Footer setPage={setPage} t={t}/>}
      {(page==='about'||page==='terms'||page==='reviews'||page==='dashboard'||page==='graphics')&&<div style={{borderTop:'0.6px solid rgba(255,255,255,.05)',padding:'20px 40px',textAlign:'center',background:'#000'}}><p style={{color:'rgba(255,255,255,.12)',fontSize:'.72rem',fontWeight:300}}>© 2026 Falcon by Mythic. All rights reserved.</p></div>}
      {auth&&<AuthModal onClose={()=>setAuth(false)} initTab={authTab} onLogin={u=>{setUser(u);setAuth(false)}} t={t}/>}
      {cartOpen&&<CartDrawer cart={cart} onClose={()=>setCartOpen(false)} onQty={qty} onRemove={rem} onCheckout={()=>{setCartOpen(false);setCheckout({type:'cart'})}} t={t}/>}
      {purchaseSuccess&&<PurchaseSuccessPage product={purchaseSuccess} setPage={(p)=>{setPurchaseSuccess(null);setPage(p);}} t={t} onAddReview={r=>{const u=[...allUserReviews,r];setAllUserReviews(u);}}/>}
      {!purchaseSuccess&&checkout&&<Checkout items={cart} total={ct} product={checkout.type==='product'?checkout.product:null} onClose={()=>setCheckout(null)} onSuccess={(prod)=>{setCheckout(null);setCart([]);setPurchaseSuccess(prod);}} t={t}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
