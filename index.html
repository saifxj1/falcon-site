/* ══ FALCON DATABASE ══ */
const FalconDB = {
  _uid: () => 'usr_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36),
  _now: () => new Date().toISOString(),
  _read: function(){ try{ return JSON.parse(localStorage.getItem('fcn_db')||'null')||{users:[],meta:{totalUsers:0,createdAt:new Date().toISOString()}}; }catch{ return {users:[],meta:{}}; }},
  _write: function(db){ localStorage.setItem('fcn_db',JSON.stringify(db)); },
  _migrate: function(){
    const old=localStorage.getItem('fcn_u');
    if(!old) return;
    try{
      const arr=JSON.parse(old);
      const db=this._read();
      arr.forEach(u=>{
        if(!db.users.find(x=>x.email===u.em)){
          db.users.push({id:this._uid(),name:u.nm,email:u.em,password:u.pw,createdAt:this._now(),lastLogin:null,purchases:[],verified:false});
          db.meta.totalUsers++;
        }
      });
      this._write(db);
      localStorage.removeItem('fcn_u');
    }catch(e){}
  },
  register: function({name,email,password}){
    this._migrate();
    const db=this._read();
    if(db.users.find(u=>u.email===email)) return {ok:false,err:'Email already registered'};
    const user={id:this._uid(),name,email,password,createdAt:this._now(),lastLogin:this._now(),purchases:[],verified:false};
    db.users.push(user);
    db.meta.totalUsers=db.users.length;
    db.meta.lastUpdated=this._now();
    this._write(db);
    return {ok:true,user};
  },
  login: function({email,password}){
    this._migrate();
    const db=this._read();
    const user=db.users.find(u=>u.email===email&&u.password===password);
    if(!user) return {ok:false,err:'Incorrect email or password'};
    user.lastLogin=this._now();
    this._write(db);
    return {ok:true,user};
  },
  getUsers: function(){ this._migrate(); return this._read().users; },
  stats: function(){ const db=this._read(); return {totalUsers:db.users.length,meta:db.meta}; },
};

function HLSVideo({src,style}){
  const vr=useRef(null);
  useEffect(()=>{
    const v=vr.current;if(!v||!src)return;
    let hls;
    if(window.Hls&&window.Hls.isSupported()){
      hls=new window.Hls();hls.loadSource(src);hls.attachMedia(v);
      hls.on(window.Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
    }else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src=src;v.addEventListener('loadedmetadata',()=>v.play().catch(()=>{}));
    }
    return()=>{if(hls)hls.destroy()};
  },[src]);
  return <video ref={vr} muted loop playsInline style={style}/>;
}

function Particles({count=16,color='rgba(80,130,255,.45)'}){
  const ps=useMemo(()=>Array.from({length:count},(_,i)=>({id:i,left:`${5+Math.random()*90}%`,top:`${10+Math.random()*80}%`,size:Math.random()*2.5+1.5,delay:`${Math.random()*7}s`,dur:`${5+Math.random()*7}s`,dx:`${(Math.random()-.5)*55}px`})),[count]);

}

function VideoBg(){
  const vr=useRef(null),rr=useRef(null);
  useEffect(()=>{
    const v=vr.current;if(!v)return;
    const F=0.6,tick=()=>{const{currentTime:t,duration:d}=v;if(d)v.style.opacity=Math.min(t/F,.55,(d-t)/F);rr.current=requestAnimationFrame(tick)};
    const end=()=>{v.style.opacity=0;setTimeout(()=>{v.currentTime=0;v.play()},80)};
    v.addEventListener('ended',end);v.play().catch(()=>{});rr.current=requestAnimationFrame(tick);
    return()=>{cancelAnimationFrame(rr.current);v.removeEventListener('ended',end)};
  },[]);

/* ══ AUTH MODAL ══ */
function AuthModal({onClose,initTab,onLogin,t}){
  const[tab,setTab]=useState(initTab||'signup');

  const[err,setErr]=useState('');const[ok,setOk]=useState(null);
  const reg=async()=>{
    setErr('');
    if(!nm.trim()) return setErr('Name required');
    if(!em.includes('@')) return setErr('Valid email required');
    if(pw.length<6) return setErr('Password 6+ chars');
    const result=FalconDB.register({name:nm,email:em,password:pw});
    if(!result.ok) return setErr(result.err);
    const s={name:nm,em,id:result.user.id};
    localStorage.setItem('fcn_s',JSON.stringify(s));
    sendWelcomeEmail(nm,em);
    setOk(s);
    onLogin(s);
  };
  const signin=()=>{
    setErr('');
    if(!em.includes('@')) return setErr('Valid email required');
    if(!pw) return setErr('Password required');
    const result=FalconDB.login({email:em,password:pw});
    if(!result.ok) return setErr(result.err);
    const s={name:result.user.name,em,id:result.user.id};
    localStorage.setItem('fcn_s',JSON.stringify(s));
    setOk(s);
    onLogin(s);
  };
  const[autoClose,setAutoClose]=useState(false);
  useEffect(()=>{
    if(ok){
      const t1=setTimeout(()=>setAutoClose(true),1800);
      const t2=setTimeout(()=>onClose(),2200);
      return()=>{clearTimeout(t1);clearTimeout(t2);}
    }
  },[ok]);
  if(ok)return(
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',animation:'fadeIn .35s both'}}>

      </div>
      {/* falcon logo top */}
      <div style={{position:'absolute',top:36,display:'flex',alignItems:'center',gap:8,opacity:.35}}>
        <img src="https://i.postimg.cc/4dZ51HLK/fcnlogonobc.png" style={{width:20,height:20,objectFit:'contain'}} alt=""/>
        <span style={{fontWeight:600,fontSize:'.85rem',letterSpacing:'-.025em'}}>falcon</span>
      </div>
      {/* success icon */}
      <div style={{position:'relative',marginBottom:32}}>
        {/* ring animation */}
        <div style={{position:'absolute',inset:-20,borderRadius:'50%',border:'1px solid rgba(100,220,140,.4)',animation:'successRing 1.4s ease-out .1s both'}}/>
        <div style={{position:'absolute',inset:-8,borderRadius:'50%',border:'0.6px solid rgba(100,220,140,.2)',animation:'successRing 1.4s ease-out .3s both'}}/>
        {/* circle */}
        <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,rgba(80,200,120,.15),rgba(60,160,100,.08))',border:'0.6px solid rgba(100,220,140,.45)',display:'flex',alignItems:'center',justifyContent:'center',animation:'successPop .6s cubic-bezier(.34,1.56,.64,1) .1s both',boxShadow:'0 0 40px rgba(100,220,140,.2),inset 0 0 20px rgba(100,220,140,.05)'}}>

            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      {/* text */}
      <div style={{textAlign:'center',animation:'countUp .5s .4s both'}}>

      </div>
    </div>
  );

/* ══ JSONBIN CONFIG ══
   لتفعيل التقييمات المشتركة:
   1. روح https://jsonbin.io وسجل حساب مجاني
   2. أنشئ Bin جديد بهذا الـ JSON: {"reviews":[]}
   3. من الـ Bin اللي أنشأته، انسخ الـ BIN_ID من الـ URL
   4. من Account > API Keys، أنشئ مفتاح وانسخه
   5. حطهم هنا تحت
═══════════════════════════════════════════ */
const JSONBIN_CONFIG = {
  binId:  'YOUR_BIN_ID',   // مثال: 64ab12cd...
  apiKey: 'YOUR_API_KEY',  // مثال: $2a$10$...
};

/* ── localStorage always-on backup ── */
function loadLocalReviews(){try{return JSON.parse(localStorage.getItem('fcn_reviews_v2')||'[]');}catch{return[];}}
function saveLocalReviews(arr){try{localStorage.setItem('fcn_reviews_v2',JSON.stringify(arr));}catch{}}

/* ── merge by id, deduplicate ── */
function mergeReviews(a,b){const seen=new Set();return [...a,...b].filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});}

async function fetchSharedReviews(){
  const local=loadLocalReviews();
  if(JSONBIN_CONFIG.binId==='YOUR_BIN_ID') return local;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`,{
      headers:{'X-Master-Key':JSONBIN_CONFIG.apiKey,'X-Bin-Meta':'false'}
    });
    const d=await r.json();
    const remote=Array.isArray(d.reviews)?d.reviews:[];
    const merged=mergeReviews(local,remote);
    /* sync back if local has newer items */
    if(merged.length>remote.length) pushSharedReview(merged).catch(()=>{});
    saveLocalReviews(merged);
    return merged;
  }catch(e){ return local; }
}

async function pushSharedReview(reviews){
  saveLocalReviews(reviews); /* always save locally first */
  if(JSONBIN_CONFIG.binId==='YOUR_BIN_ID') return;
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_CONFIG.apiKey},
      body:JSON.stringify({reviews})
    });
  }catch(e){ /* local already saved, silent fail */ }
}

function Feedback({t,setPage,onReviewsReady}){
  const[sharedReviews,setSharedReviews]=useState(()=>loadLocalReviews());

  useEffect(()=>{

function DashboardPage({setPage,t,user,onLogout}){
  const l=t===T.ar?'ar':'en';
  const dbUser=useMemo(()=>{
    try{
      const db=JSON.parse(localStorage.getItem('fcn_db')||'{}');
      return(db.users||[]).find(u=>u.email===user.em)||null;
    }catch{return null;}
  },[user]);
  const joinDate=dbUser?.createdAt?new Date(dbUser.createdAt).toLocaleDateString('en-US',{month:'long',year:'numeric'}):'2026';
  const purchases=dbUser?.purchases||[];
  const avatarLetter=user.name?.[0]?.toUpperCase()||'?';
  const bg='#000';
  const fg='#fff';
  const fg2='rgba(255,255,255,.55)';
  const fg3='rgba(255,255,255,.35)';
  const border='rgba(255,255,255,.07)';
  const cardBg='rgba(255,255,255,.03)';
  const cardBorder='rgba(255,255,255,.08)';
  const statBg='rgba(255,255,255,.04)';
  return(
    <div style={{position:'relative',minHeight:'100vh',background:bg,overflow:'hidden',paddingTop:70}}>
      {<AnimatedOrbs/><GridLines/><Particles count={14} color="rgba(60,120,255,.35)"/>
      <div style={{position:'relative',zIndex:10,maxWidth:860,margin:'0 auto',padding:'60px 24px 100px'}}>
        {/* Back */}
        <button onClick={()=>setPage('home')} style={{background:'none',border:'none',color:fg3,cursor:'pointer',fontFamily:'inherit',fontSize:'.78rem',display:'flex',alignItems:'center',gap:6,marginBottom:40,transition:'color .2s',letterSpacing:'.06em',textTransform:'uppercase',padding:0}} onMouseOver={e=>e.currentTarget.style.color=fg2} onMouseOut={e=>e.currentTarget.style.color=fg3}>← Back</button>

        {/* HERO CARD */}
        <div style={{position:'relative',border:`0.6px solid ${cardBorder}`,borderRadius:24,padding:'36px 36px 32px',background:'rgba(255,255,255,.02)',marginBottom:18,overflow:'hidden',animation:'revealUp .7s .05s both'}}>
          {/* top glow bar */}
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,rgba(60,120,255,.7) 30%,rgba(120,80,255,.8) 50%,rgba(60,120,255,.7) 70%,transparent)'}}/>
          {/* bg pattern */}
          
          <div style={{display:'flex',alignItems:'flex-start',gap:22,flexWrap:'wrap'}}>
            {/* Avatar */}
            <div style={{position:'relative',flexShrink:0}}>
              <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,rgba(60,120,255,.9),rgba(110,60,255,.85))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2rem',fontWeight:700,color:'#fff',boxShadow:'0 0 0 3px rgba(80,140,255,.2),0 0 30px rgba(80,140,255,.15)'}}>
                {avatarLetter}
              </div>
              <div style={{position:'absolute',bottom:2,right:2,width:14,height:14,borderRadius:'50%',background:'#22c55e',border:'2px solid #000'}}/>
            </div>
            {/* Info */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
                <h1 style={{fontWeight:700,fontSize:'clamp(1.3rem,3vw,1.75rem)',letterSpacing:'-.035em',color:fg,margin:0}}>{user.name}</h1>
                <span style={{background:'rgba(60,120,255,.1)',border:'0.6px solid rgba(60,120,255,.25)',color:'rgba(80,140,255,.9)',borderRadius:100,padding:'3px 11px',fontSize:'.68rem',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase',flexShrink:0}}>Member</span>
              </div>
              <p style={{color:fg2,fontSize:'.88rem',fontWeight:300,marginBottom:4,letterSpacing:'-.01em'}}>{user.em}</p>
              <p style={{color:fg3,fontSize:'.78rem',fontWeight:300}}>Member since {joinDate}</p>
            </div>
            {/* Logout */}
            <button onClick={onLogout} style={{background:'none',border:'0.6px solid rgba(255,80,80,.15)',borderRadius:10,padding:'8px 16px',cursor:'pointer',color:'rgba(255,100,100,.6)',fontSize:'.78rem',fontFamily:'inherit',transition:'all .2s',flexShrink:0}} onMouseOver={e=>{e.currentTarget.style.background='rgba(255,80,80,.08)';e.currentTarget.style.borderColor='rgba(255,80,80,.3)'}} onMouseOut={e=>{e.currentTarget.style.background='none';e.currentTarget.style.borderColor='rgba(255,80,80,.15)'}}>Sign out</button>
          </div>
        </div>

        {/* STATS ROW */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:18,animation:'revealUp .7s .12s both'}}>
          {[
            {label:'Account Status',val:'Active',valColor:'rgba(34,197,94,.85)',icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>},
            {label:'Total Orders',val:purchases.length||'0',valColor:fg,icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>},
            {label:'Falcon Plan',val:'Free',valColor:fg,icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>},
          ].map(({label,val,valColor,icon})=>(
            <div key={label} style={{border:`0.6px solid ${cardBorder}`,borderRadius:16,padding:'18px 16px',background:cardBg,display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6,color:fg3}}>{icon}<span style={{fontSize:'.7rem',fontWeight:500,letterSpacing:'.04em',textTransform:'uppercase'}}>{label}</span></div>
              <p style={{fontWeight:700,fontSize:'1.3rem',letterSpacing:'-.03em',color:valColor}}>{val}</p>
            </div>
          ))}
        </div>

        {/* ORDER HISTORY */}
        <div style={{border:`0.6px solid ${cardBorder}`,borderRadius:20,overflow:'hidden',marginBottom:18,animation:'revealUp .7s .2s both',background:cardBg}}>
          <div style={{padding:'20px 24px 16px',borderBottom:`0.6px solid ${border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={fg3} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              <span style={{fontWeight:600,fontSize:'.92rem',letterSpacing:'-.02em',color:fg}}>Order History</span>
            </div>
            {purchases.length>0&&<span style={{fontSize:'.72rem',color:fg3,fontWeight:400}}>{purchases.length} order{purchases.length!==1?'s':''}</span>}
          </div>
          <div style={{padding:'0 24px'}}>
            {purchases.length===0?(
              <div style={{padding:'44px 0',textAlign:'center'}}>
                <div style={{width:48,height:48,borderRadius:14,background:statBg,border:`0.6px solid ${border}`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={fg3} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                </div>
                <p style={{color:fg2,fontSize:'.88rem',fontWeight:400,marginBottom:4}}>No orders yet</p>
                <p style={{color:fg3,fontSize:'.78rem',fontWeight:300}}>Your purchases will appear here.</p>
              </div>
            ):purchases.map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:i<purchases.length-1?`0.6px solid ${border}`:'none'}}>
                <div>
                  <p style={{fontWeight:500,fontSize:'.85rem',color:fg,marginBottom:2}}>{p.name||'Product'}</p>
                  <p style={{fontSize:'.72rem',color:fg3,fontWeight:300}}>{p.date||''}</p>
                </div>
                <span style={{fontWeight:600,fontSize:'.9rem',color:fg}}>${p.price?.toFixed(2)||'—'}</span>
              </div>
            ))}
          </div>
        </div>

        {/* QUICK ACTIONS */}
        <div style={{animation:'revealUp .7s .28s both'}}>
          <p style={{fontSize:'.7rem',letterSpacing:'.1em',textTransform:'uppercase',color:fg3,fontWeight:500,marginBottom:12}}>Quick Actions</p>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            <button className="pill-ghost" style={{fontSize:'.82rem'}} onClick={()=>setPage('home')}>Browse Products →</button>
            <button className="pill-discord" style={{fontSize:'.82rem',gap:7}} onClick={()=>window.open('https://discord.gg/fcn','_blank')}><DiscordSvg/> Discord Support</button>
            <button className="pill-ghost" style={{fontSize:'.82rem',gap:7}} onClick={()=>window.open('https://www.youtube.com/@Falconofficial123/videos','_blank')}><YoutubeSvg/> YouTube</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ APP ══ */
function App(){
  const[page,setPage]=useState('home');
  const[lang,setLang]=useState('en');
  const t=T[lang];
  const[auth,setAuth]=useState(null);
  const[authTab,setAuthTab]=useState('signup');
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('fcn_s'))}catch{return null}});
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[checkout,setCheckout]=useState(null);
  const[allUserReviews,setAllUserReviews]=useState(()=>loadLocalReviews());
  useEffect(()=>{window.scrollTo({top:0,behavior:'instant'})},[page]);
  const openAuth=tp=>{setAuthTab(tp);setAuth(true)};
  const add=p=>{setCart(c=>{const e=c.find(i=>i.id===p.id);return e?c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...c,{...p,qty:1}]});setCartOpen(true)};
  const qty=(id,d)=>setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const rem=id=>setCart(c=>c.filter(i=>i.id!==id));
  const cn=cart.reduce((s,i)=>s+i.qty,0);
  const ct=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const allReviewsCombined=[...SEED_REVIEWS,...allUserReviews];
  const handleAddReviewFromAllPage=useCallback(async r=>{
    const updated=[...allUserReviews,r];
    setAllUserReviews(updated);
    await pushSharedReview(updated);
  },[allUserReviews]);
  const handleLogout=()=>{setUser(null);localStorage.removeItem('fcn_s');setPage('home');};
  return(
    <div style={{minHeight:'100vh',background:'#000',direction:t.dir}}>
        <Navbar onAuth={openAuth} user={user} n={cn} onCart={()=>setCartOpen(true)} page={page} setPage={setPage} lang={lang} setLang={setLang} t={t}/>
        {page==='home'&&<HomePage t={t} onAuth={openAuth} onAdd={add} onBuy={p=>setCheckout({type:'product',product:p})} setPage={setPage} onReviewsReady={setAllUserReviews}/>}
        {page==='about'&&<AboutPage setPage={setPage} t={t}/>}
        {page==='terms'&&<TermsPage setPage={setPage} t={t}/>}
        {page==='reviews'&&<AllReviewsPage setPage={setPage} t={t} reviews={allReviewsCombined} onAddReview={handleAddReviewFromAllPage}/>}
        {page==='dashboard'&&user&&<DashboardPage setPage={setPage} t={t} user={user} onLogout={handleLogout}/>}
        {page==='dashboard'&&!user&&<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><button className="pill-ghost" onClick={()=>openAuth('signin')}>Sign in to view dashboard</button></div>}
        {(page==='home')&&<Footer setPage={setPage} t={t}/>}
        {(page==='about'||page==='terms'||page==='reviews'||page==='dashboard')&&(
          <div style={{borderTop:'0.6px solid rgba(255,255,255,.05)',padding:'20px 40px',textAlign:'center',zIndex:10,background:'#000'}}>
            <p style={{color:'rgba(255,255,255,.12)',fontSize:'.72rem',fontWeight:300}}>© 2026 Falcon by Mythic. All rights reserved.</p>
          </div>
        )}
        {auth&&<AuthModal onClose={()=>setAuth(false)} initTab={authTab} onLogin={u=>{setUser(u);setAuth(false)}} t={t}/>}
        {cartOpen&&<CartDrawer cart={cart} onClose={()=>setCartOpen(false)} onQty={qty} onRemove={rem} onCheckout={()=>{setCartOpen(false);setCheckout({type:'cart'})}} t={t}/>}
        {checkout&&<Checkout items={cart} total={ct} product={checkout.type==='product'?checkout.product:null} onClose={()=>setCheckout(null)} t={t}/>}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
